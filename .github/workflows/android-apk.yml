name: Android APK

on:
  push:
    paths:
      - 'Android/src/**'
      - 'model_allowlist.json'
      - 'model_allowlists/**'
      - '.github/workflows/android-apk.yml'
  pull_request:
    paths:
      - 'Android/src/**'
      - 'model_allowlist.json'
      - 'model_allowlists/**'
      - '.github/workflows/android-apk.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Android/src

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --licenses < /dev/null > /dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew --no-daemon :app:assembleDebug

      - name: Build release APK
        run: ./gradlew --no-daemon :app:assembleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: gallery-debug-apk-${{ github.sha }}
          path: Android/src/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14
