name: Bug report
description: Report a reproducible problem in this fork.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.

        This repository is a maintained fork of Google AI Edge Gallery. Please make it clear whether the issue affects:
        - this fork's HTTP bridge / fork-specific behavior, or
        - upstream app behavior in general.
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Fork-specific behavior
        - Probably upstream behavior
        - Not sure
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug clearly and concisely.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Tap ...
        3. Run ...
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: app_version
    attributes:
      label: App version or commit
      placeholder: 0.3.0-alpha / commit SHA
  - type: input
    id: device
    attributes:
      label: Device
      placeholder: e.g. Samsung Galaxy S23
  - type: input
    id: android_version
    attributes:
      label: Android version
      placeholder: e.g. Android 14
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Do not attach full public bug-report zips or secrets. Use redacted snippets only.
      render: text
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I checked the current project status in docs/STATE.md.
          required: true
        - label: I am not posting sensitive data or full bug-report archives publicly.
          required: true
