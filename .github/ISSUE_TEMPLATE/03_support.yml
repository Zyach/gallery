name: Support request
description: Ask for help using, configuring, or validating this fork.
title: "[Support]: "
labels: ["support", "question"]
body:
  - type: textarea
    id: goal
    attributes:
      label: What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: blocked
    attributes:
      label: Where are you blocked?
    validations:
      required: true
  - type: textarea
    id: tried
    attributes:
      label: What have you tried so far?
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: device, Android version, app version or commit
  - type: textarea
    id: messages
    attributes:
      label: Relevant messages or logs
      render: text
